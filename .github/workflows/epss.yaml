name: Trivy EPSS Docker Scan

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Build Docker image
      - name: Build Docker Image
        run: |
          docker build -f dev.dockerfile -t my-app:latest .

      # 3️⃣ Run Trivy scan on image
      - name: Run Trivy Scan (Image)
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          scan-type: image
          image-ref: my-app:latest
          format: json
          output: trivy.json
          ignore-unfixed: true

      # 4️⃣ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 5️⃣ Debug (optional but useful)
      - name: Show vulnerabilities
        run: |
          jq '.Results[].Vulnerabilities[]?.VulnerabilityID' trivy.json | head

      # 6️⃣ EPSS Filtering (MAIN LOGIC)
      - name: EPSS Filtering
        run: |
          echo "🔍 Checking exploitable vulnerabilities..."

          COUNT=$(jq '
          [.Results[].Vulnerabilities[]? 
          | select(
              (.Severity == "HIGH" or .Severity == "CRITICAL")
              and (.EPSS.Score != null and .EPSS.Score > 0.1)
          )] | length
          ' trivy.json)

          echo "High-risk vulnerabilities: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Build failed due to exploitable vulnerabilities!"
            exit 1
          else
            echo "✅ No high-risk vulnerabilities"
          fi
          
      - name: Debug EPSS values
        run: |
          jq '.Results[].Vulnerabilities[] | {id: .VulnerabilityID, epss: .EPSS}' trivy.json | head
          
      # 7️⃣ Generate HTML report
      - name: Generate HTML report
        run: |
          docker run --rm \
            -v $PWD:/data \
            aquasec/trivy:0.50.0 \
            convert \
            --format template \
            --template "@/contrib/html.tpl" \
            --output /data/report.html \
            /data/trivy.json

      # 8️⃣ Upload report
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-epss-report
          path: report.html
