name: Trivy EPSS Security Scan

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Trivy scan
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@v0.19.0
        with:
          scan-type: fs
          format: json
          output: trivy.json
          ignore-unfixed: true

      # 3️⃣ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 4️⃣ EPSS Filtering
      - name: EPSS Risk Filtering
        run: |
          COUNT=$(jq '
          [.Results[].Vulnerabilities[]? 
          | select(
              (.Severity == "HIGH" or .Severity == "CRITICAL")
              and (.EPSS.Score != null and .EPSS.Score > 0.1)
          )] | length
          ' trivy.json)

          echo "High-risk vulnerabilities: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Build failed!"
            exit 1
          else
            echo "✅ No high-risk vulnerabilities"
          fi

      # 5️⃣ HTML Report
      - name: Generate HTML report
        run: |
          docker run --rm \
            -v $PWD:/data \
            aquasec/trivy:0.50.0 \
            convert \
            --format template \
            --template "@/contrib/html.tpl" \
            --output /data/report.html \
            /data/trivy.json

      # 6️⃣ Upload report
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: report.html
