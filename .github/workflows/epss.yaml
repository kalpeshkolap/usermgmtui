name: Trivy EPSS Security Scan

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  trivy-scan:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Run Trivy scan (JSON output with EPSS)
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: json
          output: trivy.json
          ignore-unfixed: true

      # 3️⃣ Install jq (for filtering)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 4️⃣ Filter vulnerabilities using EPSS
      - name: EPSS Risk Filtering
        run: |
          echo "🔍 Checking for exploitable vulnerabilities..."

          COUNT=$(jq '
          [.Results[].Vulnerabilities[]? 
          | select(
              (.Severity == "HIGH" or .Severity == "CRITICAL")
              and (.EPSS.Score != null and .EPSS.Score > 0.1)
          )] | length
          ' trivy.json)

          echo "High-risk vulnerabilities found: $COUNT"

          if [ "$COUNT" -gt 0 ]; then
            echo "❌ Build failed due to exploitable vulnerabilities!"
            exit 1
          else
            echo "✅ No high-risk vulnerabilities found"
          fi

      # 5️⃣ Generate filtered JSON (only high EPSS)
      - name: Create filtered report
        run: |
          jq '
          {
            Results: [
              .Results[] | {
                Target: .Target,
                Vulnerabilities: [
                  .Vulnerabilities[]? 
                  | select(
                      (.Severity == "HIGH" or .Severity == "CRITICAL")
                      and (.EPSS.Score > 0.1)
                  )
                ]
              }
            ]
          }
          ' trivy.json > filtered.json

      # 6️⃣ Generate HTML report
      - name: Generate HTML report
        run: |
          docker run --rm \
            -v $PWD:/data \
            aquasec/trivy:latest \
            convert \
            --format template \
            --template "@/contrib/html.tpl" \
            --output /data/report.html \
            /data/filtered.json

      # 7️⃣ Upload HTML report as artifact
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-epss-report
          path: report.html
